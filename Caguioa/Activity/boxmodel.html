<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
   
     #header{
        border: 1px solid red;
        width:100%;
        height:150px;
        background-color: antiquewhite;
    } 
    #navigation{
        border:1px solid red;
        width:100%;
        height:70px;
    }
    #banner{
        border:1px solid red;
        width:100%;
        height:400px;
        background-color: beige;
    }
    #main {
        width:100%;
        border:1px solid red;
        background-color: darkkhaki;
    }
    #leftside{
        float:left;
        width:30%;
        background-color: rgb(201, 177, 141);
    }
    #rightside{
        float:left;
        width: 70%;
        background-color: rgb(219, 164, 80);

    }
    #footer{
        border:1px solid red;
        width:100%;
        height:150px;
        background-color: antiquewhite;
    }
   


    

    </style>
</head>
<body>
    <div id="header">
        Header
    </div>
    <div id="navigation">
        Navigation
    </div>
    <div id="banner">
        Banner
    </div>
    <div id="main">
        <div id="leftside"> Leftside</div>
        <div id="rightside">Rightside</div>
    </div>
    <div id="footer">
        Footer
    </div>
</body>
</html>
